# ============================================================================
# OpenReward + Tinker RL Training Config
# ============================================================================
# Bu config dosyası, Tinker framework ile RL training çalıştırmak için kullanılır.
# Detaylar: https://docs.openreward.ai/training

wandb_project_name: "openreward-tutorial"
wandb_run_name: "tutorial-rl-run"
openreward_run_name: "tutorial-rl-run"
log_path: "/tmp/tinker-rl"

# Global Secrets
# null = environment variable'dan oku
secrets:
  openai_api_key: null

# Model Configuration
model_name: "Qwen/Qwen3-30B-A3B"
lora_rank: 8
# resume_from: "tinker://run-id/weights/checkpoint_000050"

# Generation Settings
max_response_tokens: 4096
max_total_tokens: 32768
max_rollout_retries: 3

# Training Hyperparameters
loss_fn: "ppo"                    # Seçenekler: importance_sampling, ppo, cispo, dro
loss_fn_config:
  clip_low_threshold: 0.8
  clip_high_threshold: 1.2
advantage_calculation: "centered_normalized"
batch_size: 32
learning_rate: 1e-5
weight_decay: 0.0
num_epochs: null                  # null = sonsuz training
save_every: 10                    # Her N batch'te checkpoint kaydet

# Concurrency
max_active_tasks: 999999
max_rollout_concurrency: null
rollout_timeout: 900              # Saniye cinsinden rollout timeout

# Agent Settings
thinking: false
seed: 42

# ============================================================================
# Environment Configuration
# ============================================================================
# Birden fazla environment eklenebilir.
# Her environment için splits, rollout sayısı ve reward ayarları yapılır.

environments:
  GeneralReasoning/WhoDunit:
    splits:
      train:
        shuffle: true
        num_samples: null
    num_rollouts: 16
    max_failing_rollouts: 2
    temperature: 1.0
    reward_reduction: "sum"
    nonterminal_reward: 0.0
